name: Validate Infra

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      webhooktarget:
        description: "Teams webhook destination"
        required: true
        type: choice
        default: testing
        options:
          - testing
          - infra

env:
  SERVICE_NAME: find-placement-schools
  VALIDATION_ENVIRONMENT: production

jobs:
  validate:
    name: ${{ matrix.display }}
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - display: AKS infrastructure
            validation_plan: aks-infra
            terraform_base: terraform/application
          - display: Domains infrastructure
            validation_plan: domains-infra
            terraform_base: terraform/domains/infrastructure
          - display: Domains environment
            validation_plan: domains-env
            terraform_base: terraform/domains/environment_domains
    env:
      TEAMS_WEBHOOK_URL: "${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.webhook-target == 'testing' && secrets.TEAMS_WEBHOOK_URL_TESTING) || secrets.TEAMS_WEBHOOK_URL_INFRA }}"

    steps:
      - name: Validate ${{ matrix.display }}
        uses: DFE-Digital/github-actions/validate-infra@master
        with:
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          environment: ${{ env.VALIDATION_ENVIRONMENT }}
          gcp-wip: projects/712009772377/locations/global/workloadIdentityPools/find-placement-schools/providers/find-placement-schools
          gcp-project-id: rugged-abacus-218110
          terraform-base: ${{ matrix.terraform_base }}
          validation-plan: ${{ matrix.validation_plan }}
          service: ${{ env.SERVICE_NAME }}
          teams-webhook-url: ${{ env.TEAMS_WEBHOOK_URL }}
